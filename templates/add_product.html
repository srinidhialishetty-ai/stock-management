{% extends "base.html" %}
{% block title %}Add Product | Stock Management with Inventory Analysis{% endblock %}
{% block content %}
<section class="page-header">
    <span class="eyebrow">Manual entry</span>
    <h1>Add a new product to your inventory.</h1>
</section>
<form class="form-card" method="post">
    <label>Product Name
        <input type="text" name="name" placeholder="Example: Floral Rayon Kurti" required>
    </label>
    <label>Category
        <select name="category" required>
            <option value="">Select category</option>
            {% for category in categories %}
                <option value="{{ category }}">{{ category }}</option>
            {% endfor %}
        </select>
    </label>
    <label>Price
        <input type="number" step="0.01" min="0" name="price" placeholder="0.00" required>
    </label>
    <label>Quantity
        <input type="number" min="0" name="quantity" placeholder="0" required>
    </label>
    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save Product</button>
        <a class="btn btn-secondary" href="{{ url_for('products') }}">Back to Inventory</a>
    </div>
</form>
{% endblock %}
